name: Fetch US Market Data (FMP + Yahoo)

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다: quote (시세 + 기술지표)
  workflow_dispatch:
    inputs:
      mode:
        description: "quote or profile"
        default: "quote"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch market data (quote)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: node scripts/fetch-market.js ${{ github.event.inputs.mode || 'quote' }}

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update market data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
