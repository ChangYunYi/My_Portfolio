name: Fetch US Market Profile (FMP fundamentals)

on:
  schedule:
    - cron: "0 0,12 * * *"   # 하루 2회: 00:00, 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch profile data
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: node scripts/fetch-market.js profile

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update market profile $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
