<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#04080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>2026 Portfolio Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#04080f;--s1:#0b1525;--s2:#10203d;--s3:#182f52;
    --card:#0d1a30;--bdr:#1f3a62;
    --txt:#f2f6ff;--txt2:#d4dfef;--sub:#9db5d4;--mute:#5e82a8;
    --blue:#4d9aff;--purple:#ae82ff;--green:#2ee0a8;--red:#ff6b78;
    --amber:#ffc05c;--cyan:#14e0f5;--pink:#ff6bb5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:'Segoe UI','Noto Sans KR',system-ui,sans-serif;min-height:100vh}
  .header{background:linear-gradient(180deg,var(--s2),var(--bg));border-bottom:1px solid var(--bdr);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;box-shadow:0 4px 20px rgba(77,154,255,0.3)}
  .header h1{font-size:20px;font-weight:900;letter-spacing:-0.3px;color:var(--txt)}
  .header-meta{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:8px;margin-top:2px}
  .bdg{padding:2px 8px;border-radius:5px;font-size:9px;font-weight:700}
  .bdg-ok{background:rgba(46,224,168,0.18);color:var(--green)}
  .bdg-ld{background:rgba(77,154,255,0.18);color:var(--blue);animation:pulse 1.5s infinite}
  .bdg-er{background:rgba(255,107,120,0.18);color:var(--red)}
  .total-val{font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .wrap{max-width:1480px;margin:0 auto;padding:14px 20px 60px}
  .tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--s1);border-radius:11px;padding:3px;border:1px solid var(--bdr);overflow-x:auto}
  .tabs button{flex:0 0 auto;padding:9px 16px;border-radius:9px;border:none;background:transparent;color:var(--mute);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all 0.2s;white-space:nowrap}
  .tabs button.active{background:var(--card);color:var(--txt);box-shadow:0 2px 12px rgba(0,0,0,0.4),inset 0 0 0 1px var(--bdr)}
  .tabs button:hover:not(.active){color:var(--sub)}
  .card{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--bdr);position:relative;overflow:hidden}
  .topline{position:absolute;top:0;left:0;right:0;height:2px}
  .lbl{font-size:12px;color:var(--sub);font-weight:700;margin-bottom:6px;letter-spacing:0.4px;text-transform:uppercase}
  .big{font-size:28px;font-weight:900;color:var(--txt)}
  .mid{font-size:14px;font-weight:700}
  .side-cards .card{padding:10px 14px}
  .side-cards .lbl{font-size:10px;margin-bottom:2px}
  .side-cards .big{font-size:20px}
  .side-cards .mid{font-size:12px}
  .grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:16px}
  .grid-2e{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .tbl-wrap{overflow-x:auto}
  .tbl-wrap tr[style*="cursor"]:hover{background:var(--s2)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{padding:10px 6px;text-align:right;color:var(--sub);font-weight:700;font-size:11px;white-space:nowrap;border-bottom:2px solid var(--bdr)}
  th:first-child{text-align:left}
  td{padding:12px 6px;text-align:right;border-bottom:1px solid rgba(31,58,98,0.2)}
  td:first-child{text-align:left}
  tr:hover td{background:rgba(24,47,82,0.5)}
  .mono{font-family:'Consolas','Courier New',monospace;font-weight:700;font-size:13px}
  .b{display:inline-flex;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:800;line-height:1.6}
  .b-up{color:var(--green);background:rgba(46,224,168,0.14)}
  .b-dn{color:var(--red);background:rgba(255,107,120,0.14)}
  .pbar{height:7px;background:var(--s1);border-radius:4px;overflow:hidden;margin-top:4px}
  .pbar-fill{height:100%;border-radius:4px;transition:width 0.8s}
  .section{animation:fadeIn 0.4s ease-out}
  .loader{text-align:center;padding:60px;color:var(--sub);font-size:14px}
  .spin{display:inline-block;width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
  .refresh-btn{background:var(--s1);border:1px solid var(--bdr);border-radius:8px;padding:7px 16px;color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s}
  .refresh-btn:hover{background:var(--s2);color:var(--txt)}
  .treemap-box{position:relative;width:100%;border-radius:10px;overflow:hidden}
  .tm-cell{position:absolute;overflow:hidden;cursor:pointer;transition:filter 0.15s;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border:1px solid rgba(4,8,15,0.6)}
  .tm-cell:hover{filter:brightness(1.25);z-index:2}
  .tm-name{font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.8);line-height:1.2}
  .tm-val{font-weight:600;color:rgba(255,255,255,0.85);text-shadow:0 1px 3px rgba(0,0,0,0.8);line-height:1.2}
  .tm-pct{font-weight:700;color:rgba(255,255,255,0.65);text-shadow:0 1px 2px rgba(0,0,0,0.8)}
  .tm-legend{display:flex;gap:14px;margin-top:10px}
  .tm-leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txt);font-weight:700}
  .tm-dot{width:10px;height:10px;border-radius:3px}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  @media(max-width:768px){.grid-2e,.grid-3{grid-template-columns:1fr}.header{padding:10px 14px}.wrap{padding:10px 12px 40px}
    [style*="grid-template-columns: 1.8fr"]{grid-template-columns:1fr!important;height:auto!important}
    #tmGrid{grid-template-columns:1fr!important}
    #topGrid{grid-template-columns:1fr!important}}

  /* ── RS SENTINEL 통합 스타일 ── */
  @keyframes rsBlink{0%,100%{border-color:rgba(239,68,68,.2)}50%{border-color:rgba(239,68,68,.9)}}
  @keyframes rsPopIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
  .rs-badge{display:inline-block;font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;line-height:1.7;margin-right:2px;margin-top:1px;vertical-align:middle}
  .rs-crit{color:#ef4444;background:rgba(239,68,68,.15)}
  .rs-high{color:#f97316;background:rgba(249,115,22,.15)}
  .rs-med{color:#eab308;background:rgba(234,179,8,.15)}
  .rs-ok{color:#2ee0a8;background:rgba(46,224,168,.12)}
  /* 카드 숫자 배지 */
  .rs-cnt-badge{position:absolute;top:7px;right:7px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;font-size:9px;font-weight:800;font-family:monospace;pointer-events:none;transition:background .3s}
  .rs-cnt-risk{background:#ef4444;color:#fff;box-shadow:0 0 8px rgba(239,68,68,.5)}
  .rs-cnt-ok{background:rgba(46,224,168,.15);color:#2ee0a8}
  .rs-cnt-wait{background:var(--s2);color:var(--mute)}
  /* 카드 */
  .rs-mon-card{background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:11px 12px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .3s,box-shadow .3s,transform .15s}
  .rs-mon-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
  .rs-mon-card.rs-alert{animation:rsBlink 2s ease-in-out infinite;box-shadow:0 0 14px rgba(239,68,68,.18)}
  .rs-dot-live{display:inline-block;width:6px;height:6px;border-radius:50%;background:#2ee0a8;vertical-align:middle}
  .rs-dot-load{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ffc05c;animation:pulse 1.5s infinite;vertical-align:middle}
  .rs-spark-ph{height:28px;border-radius:3px;background:linear-gradient(90deg,var(--s1),var(--s2),var(--s1));background-size:200% 100%;animation:pulse 2s infinite}
  /* 상세 팝업 오버레이 */
  .rs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
  .rs-popup{width:100%;max-width:620px;max-height:90vh;background:#0d1525;border:1px solid var(--bdr);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,.7);animation:rsPopIn .22s ease-out}
  .rs-popup-head{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;background:#0b1220;border-bottom:1px solid var(--bdr);flex-shrink:0}
  .rs-popup-body{flex:1;overflow-y:auto;padding:18px 22px}
  .rs-popup-body::-webkit-scrollbar{width:4px}
  .rs-popup-body::-webkit-scrollbar-track{background:transparent}
  .rs-popup-body::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
  .rs-popup-close{background:none;border:1px solid var(--bdr);color:var(--sub);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .rs-popup-close:hover{background:var(--s2);color:var(--txt)}
  .rs-ind-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
  .rs-ind-cell{text-align:center;padding:9px 4px;background:var(--s1);border-radius:8px;border:1px solid var(--bdr)}
  .rs-ind-label{font-size:8px;color:var(--mute);font-weight:700;letter-spacing:.3px;margin-bottom:3px}
  .rs-ind-val{font-size:12px;font-weight:800;font-family:monospace}
  .rs-risk-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;margin-bottom:4px;background:var(--s1)}
  .rs-port-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .rs-port-cell{padding:9px 12px;background:var(--s1);border-radius:8px;border:1px solid var(--bdr)}
  @media(max-width:600px){.rs-ind-grid{grid-template-columns:repeat(3,1fr)}.rs-port-grid{grid-template-columns:repeat(2,1fr)}.rs-popup{border-radius:14px}}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <div class="logo">P</div>
    <div>
      <h1>2026 Portfolio Dashboard</h1>
      <div class="header-meta">
        <span id="rateDisp">₩---/USD</span>
        <span id="statusBadge" class="bdg bdg-ld">LOADING</span>
        <span id="loadInfo"></span>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:14px;align-items:center">
    <button class="refresh-btn" onclick="_countdown=600;loadAllSheets()">↻ 새로고침</button>
    <span id="refreshTimer" style="font-size:10px;color:var(--mute);font-weight:600;min-width:32px">10:00</span>
    <div style="text-align:right">
      <div style="font-size:10px;color:var(--sub);font-weight:700">총 자산</div>
      <div class="total-val" id="grandTotal">---</div>
    </div>
  </div>
</header>
<div class="wrap">
  <div class="tabs" id="tabBar"></div>
  <div id="content"><div class="loader"><div class="spin"></div><div>구글 시트에서 데이터 로딩 중...</div></div></div>
</div>

<script>
const SID = "1b9GtLud9TDFm4AvUnCEfDGu_4CTqYfRU8oYFAh2VSxc";
// ★ 데이터시트2 추가
const SHEETS = ["TotalBoard","지수형 포트폴리오","배당 포트폴리오","성장 포트폴리오","국내 포트폴리오","데이터시트","데이터시트2"];
const TABS = [
  {id:"overview",label:"전체 개요",icon:"◎"},
  {id:"index",label:"지수형",icon:"📊"},
  {id:"dividend",label:"배당",icon:"💰"},
  {id:"growth",label:"성장",icon:"🚀"},
  {id:"kr",label:"국내",icon:"🇰🇷"},
  {id:"us-risk",label:"미장 Risk",icon:"🌎"},
  {id:"kr-risk",label:"국장 Risk",icon:"📡"},
];
// 포트폴리오별 티커는 동적으로 생성 (TICKER_MAP은 parseAll에서 자동 구성)
let TICKER_MAP = { index:[], dividend:[], growth:[] };
const LINE_COLORS = ["#4d9aff","#ae82ff","#2ee0a8","#ffc05c","#ff6bb5","#14e0f5","#ff6b78","#8b5cf6"];

let RAW={}, P={}, activeTab="overview", charts={};

// ═══ JSONP ═══
function jsonp(sheet) {
  return new Promise((res,rej)=>{
    const cb=`_c${Date.now()}${Math.random().toString(36).slice(2,5)}`;
    const t=setTimeout(()=>{cl();rej("timeout")},15000);
    const cl=()=>{clearTimeout(t);delete window[cb];document.getElementById(cb)?.remove()};
    window[cb]=r=>{cl();r?.status==="ok"&&r?.table?res(r.table):rej(r?.status)};
    const s=document.createElement("script");s.id=cb;
    s.src=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(sheet)}`;
    s.onerror=()=>{cl();rej("err")};document.head.appendChild(s);
  });
}
async function loadAllSheets() {
  const badge=document.getElementById("statusBadge"),info=document.getElementById("loadInfo");
  badge.className="bdg bdg-ld";badge.textContent="LOADING";
  let ok=0;
  for(const n of SHEETS){try{RAW[n]=await jsonp(n);ok++}catch(e){console.warn(n,e)} info.textContent=`${ok}/${SHEETS.length}`}
  if(ok>=3){badge.className="bdg bdg-ok";badge.textContent=`LIVE · ${ok}/${SHEETS.length}`;parseAll()}
  else{badge.className="bdg bdg-er";badge.textContent="FAIL"}
}

// ═══ HELPERS ═══
function V(t,r,c){const cell=t?.rows?.[r]?.c?.[c];return cell?cell.v:null}
function Vn(t,r,c){const v=V(t,r,c);if(typeof v==="number")return v;if(v==null)return 0;return parseFloat(String(v).replace(/[₩$,%▲▼\s]/g,"").replace(/,/g,""))||0}
function Vf(t,r,c){const cell=t?.rows?.[r]?.c?.[c];if(!cell)return"";return cell.f!=null?String(cell.f):(cell.v!=null?String(cell.v):"")}
function Vs(t,r,c){return String(V(t,r,c)||"")}
function p100(v){return typeof v==="number"?(Math.abs(v)<1?v*100:v):0}
function fU(n){return"$"+Math.round(n).toLocaleString("en-US")}
function fUd(n){return"$"+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}
function fK(n){const a=Math.abs(n);if(a>=1e8)return(n/1e8).toFixed(1)+"억";if(a>=1e4)return Math.round(n/1e4).toLocaleString()+"만";return Math.round(n).toLocaleString()+"원"}
function fP(n){return(n>=0?"+":"")+Number(n).toFixed(2)+"%"}
function pc(n){return n>=0?"var(--green)":"var(--red)"}
function bc(n){return n>=0?"b-up":"b-dn"}

// ═══ PARSE ═══
function parseAll(){
  const tb=RAW["TotalBoard"],ds=RAW["데이터시트"],kr_raw=RAW["국내 포트폴리오"];
  
  P.rate=1440;
  if(ds){const r=Vn(ds,0,4);if(r>1000&&r<2000)P.rate=r}
  if(kr_raw){for(let i=kr_raw.rows.length-1;i>=0;i--){if(Vs(kr_raw,i,3)==="환율"){const r=Vn(kr_raw,i,4);if(r>1000)P.rate=r;break}}}
  
  P.tb={};
  if(tb){for(let i=0;i<Math.min(tb.rows.length,5);i++){
    const nm=Vs(tb,i,0);
    if(["지수형","배당","성장","Total"].includes(nm))P.tb[nm]={inv:Vn(tb,i,1),val:Vn(tb,i,2),plp:Vn(tb,i,3)*100};
  } P.tb["국내"]={inv:Vn(tb,0,7),val:Vn(tb,0,8),plp:Vn(tb,0,9)*100}}
  
  const stdCols={name:1,ticker:2,qty:3,avg:4,cur:5,daily:6,inv:7,val:8,pl:9,plp:10,divY:11,bb20:12,bb252:13,rsi:14,mdd:15,target:16};
  P.index=parsePort("지수형 포트폴리오",stdCols);
  P.dividend=parsePort("배당 포트폴리오",stdCols);
  P.growth=parsePort("성장 포트폴리오",stdCols);
  P.kr=parsePort("국내 포트폴리오",{name:1,ticker:3,qty:4,avg:5,cur:6,daily:7,inv:8,val:9,pl:10,plp:11,divY:12,bb20:13,bb252:14,rsi:15,mdd:16,target:17});
  
  P.cash={rp:0,usd:0,krw:0};
  const dv=RAW["배당 포트폴리오"];
  if(dv){for(let i=0;i<dv.rows.length;i++){
    const n=Vs(dv,i,1);
    if(n==="삼성RP"){P.cash.rp=parseFloat(Vf(dv,i,2).replace(/[$,]/g,""))||0}
    if(n==="예수금"){P.cash.usd=parseFloat(Vf(dv,i,2).replace(/[$,]/g,""))||0;P.cash.krw=Vn(dv,i,3)}
  }}
  
  // ★ 데이터시트2 파싱: 컬럼 라벨에서 티커 자동 감지 + 포트폴리오 매칭
  P.tickerHistory = {};
  const ds2 = RAW["데이터시트2"];
  if (ds2) {
    const cols = ds2.cols || [];
    const rows = ds2.rows || [];
    
    // 1) 컬럼 스캔: (Date컬럼, Close컬럼) 쌍 자동 감지
    const pairs = [];
    for (let ci = 0; ci < cols.length - 1; ci += 2) {
      const label = (cols[ci].label || "").trim();
      const type = cols[ci].type;
      if (type === "datetime" || type === "date" || label.includes("Date")) {
        const ticker = label.replace(/\s*Date\s*/i, "").trim().toUpperCase();
        if (ticker) pairs.push({ ticker, dateCol: ci, priceCol: ci + 1 });
      }
    }
    
    // 2) 각 티커별 시계열 추출
    pairs.forEach(pair => {
      const history = [];
      for (let ri = 0; ri < rows.length; ri++) {
        const dateStr = Vf(ds2, ri, pair.dateCol);
        const price = Vn(ds2, ri, pair.priceCol);
        if (!dateStr || price === 0) continue;
        let short = dateStr.replace(/\s*오[전후]\s*\d+:\d+:\d+/g, "").trim();
        if (short.length > 12) short = short.slice(0, 12);
        history.push({ d: short, p: price });
      }
      if (history.length > 1) P.tickerHistory[pair.ticker] = history;
    });
    
    // 3) 포트폴리오 티커와 데이터시트2 티커를 자동 매칭 → TICKER_MAP 동적 구성
    const ds2Tickers = new Set(Object.keys(P.tickerHistory));
    TICKER_MAP.index = P.index.map(h => h.ticker.toUpperCase()).filter(t => ds2Tickers.has(t));
    TICKER_MAP.dividend = P.dividend.map(h => h.ticker.toUpperCase()).filter(t => ds2Tickers.has(t));
    TICKER_MAP.growth = P.growth.map(h => h.ticker.toUpperCase()).filter(t => ds2Tickers.has(t));
    
    console.log("데이터시트2 종목:", [...ds2Tickers].join(", "));
    console.log("TICKER_MAP 자동 구성:", JSON.stringify(TICKER_MAP));
  }
  
  const sum=(a,k)=>a.reduce((s,h)=>s+(h[k]||0),0);
  P.idxT={inv:sum(P.index,"inv"),val:sum(P.index,"val")};
  P.divT={inv:sum(P.dividend,"inv"),val:sum(P.dividend,"val")};
  P.groT={inv:sum(P.growth,"inv"),val:sum(P.growth,"val")};
  P.krT={inv:sum(P.kr,"inv"),val:sum(P.kr,"val")};
  P.usdAll=P.idxT.val+P.divT.val+P.groT.val;
  P.cashAll=P.cash.rp+P.cash.usd;
  P.grand=P.usdAll+P.krT.val/P.rate+P.cashAll;
  
  document.getElementById("rateDisp").textContent=`₩${P.rate.toLocaleString()}/USD`;
  document.getElementById("grandTotal").textContent=fU(Math.round(P.grand));
  renderTabs();switchTab(activeTab);
  setTimeout(startRSSentinel, 200);
}

function parsePort(sheetName,cols){
  const t=RAW[sheetName];if(!t)return[];
  const items=[];
  for(let i=0;i<t.rows.length;i++){
    const name=Vs(t,i,cols.name);
    if(!name||name==="현금"||name.includes("관심")||name.includes("Total"))continue;
    if(!V(t,i,cols.name))continue;
    const h={
      name, ticker:Vs(t,i,cols.ticker), qty:Vn(t,i,cols.qty), avg:Vn(t,i,cols.avg), cur:Vn(t,i,cols.cur),
      daily:p100(Vn(t,i,cols.daily)), inv:Vn(t,i,cols.inv), val:Vn(t,i,cols.val), pl:Vn(t,i,cols.pl),
      plp:p100(Vn(t,i,cols.plp)), divY:p100(Vn(t,i,cols.divY)),
      rsi:cols.rsi!=null?Vn(t,i,cols.rsi):0, mdd:p100(Vn(t,i,cols.mdd)),
      target:cols.target!=null?Vf(t,i,cols.target):"",
      bb20:cols.bb20!=null?Vn(t,i,cols.bb20):0, bb252:cols.bb252!=null?Vn(t,i,cols.bb252):0,
    };
    if(h.val===0&&h.inv===0&&h.qty===0)continue;
    items.push(h);
  }
  return items;
}

// ═══ SQUARIFIED TREEMAP ═══
function squarify(data, x, y, w, h) {
  const sorted=[...data].filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
  const totalVal=sorted.reduce((s,d)=>s+d.value,0);
  if(totalVal<=0||!sorted.length)return[];
  const totalArea=w*h;
  const nodes=sorted.map(d=>({...d,area:(d.value/totalVal)*totalArea}));
  const result=[];
  _layRows(nodes,x,y,w,h,result);
  return result;
}
function _layRows(nodes,x,y,w,h,out){
  if(!nodes.length)return;
  if(nodes.length===1){out.push({...nodes[0],x,y,w,h});return}
  if(w<=0||h<=0)return;
  const short=Math.min(w,h);
  let row=[],rowArea=0,bestW=Infinity,splitAt=1;
  for(let i=0;i<nodes.length;i++){
    row.push(nodes[i]);rowArea+=nodes[i].area;
    const wr=_worstR(row,rowArea,short);
    if(wr<=bestW){bestW=wr;splitAt=i+1}else break;
  }
  const rn=nodes.slice(0,splitAt),rm=nodes.slice(splitAt);
  const rA=rn.reduce((s,n)=>s+n.area,0),rL=rA/short;
  let off=0;
  if(w>=h){
    rn.forEach(n=>{const cH=n.area/rL;out.push({...n,x,y:y+off,w:rL,h:cH});off+=cH});
    if(rm.length)_layRows(rm,x+rL,y,w-rL,h,out);
  }else{
    rn.forEach(n=>{const cW=n.area/rL;out.push({...n,x:x+off,y,w:cW,h:rL});off+=cW});
    if(rm.length)_layRows(rm,x,y+rL,w,h-rL,out);
  }
}
function _worstR(row,rowArea,short){
  const rL=rowArea/short;let w=0;
  for(const n of row){const c=n.area/rL;const r=Math.max(rL/c,c/rL);if(r>w)w=r}
  return w;
}

const ETF_TICKERS=new Set(["QQQ","QQQM","SPYM","SPY","VOO","VGK","VTI","VEA","VWO","SCHD","TLT","DGRW","JEPI","JEPQ","IVV","AGG","BND","VNQ","XLF","XLK","XLE","DIA","IWM","EFA","EEM","GLD","SLV","ARKK","TQQQ","SQQQ","SOXX","SMH","HUMN"]);

function renderTreemap(cid,data,fmt){
  const box=document.getElementById(cid);if(!box)return;
  const W=box.offsetWidth,H=box.offsetHeight,total=data.reduce((s,d)=>s+d.value,0);
  if(total<=0){box.innerHTML='';return}
  const rects=squarify(data,0,0,W,H);
  box.innerHTML="";
  rects.forEach(r=>{
    const div=document.createElement("div");div.className="tm-cell";
    div.style.cssText=`left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;background:${r.color}`;
    const pct=r.value/total*100,mn=Math.min(r.w,r.h);
    const ns=Math.max(9,Math.min(17,mn*0.2)),vs=Math.max(8,Math.min(14,mn*0.14)),ps=Math.max(7,Math.min(11,mn*0.1));
    const ds=Math.max(7,Math.min(11,mn*0.11));
    const dailyStr=r.daily!=null?`${r.daily>=0?"+":""}${r.daily.toFixed(2)}%`:"";
    const plpStr=r.plp!=null?`${r.plp>=0?"+":""}${r.plp.toFixed(1)}%`:"";
    let h="";
    if(r.w>30&&r.h>18)h+=`<div class="tm-name" style="font-size:${ns}px">${r.ticker||r.label}</div>`;
    if(r.w>45&&r.h>32)h+=`<div class="tm-val" style="font-size:${vs}px">${fmt(r.value)}</div>`;
    if(r.w>55&&r.h>44&&plpStr)h+=`<div class="tm-pct" style="font-size:${ps}px">${plpStr}</div>`;
    if(r.w>55&&r.h>56&&dailyStr)h+=`<div class="tm-pct" style="font-size:${ds}px;margin-top:1px">${dailyStr}</div>`;
    div.innerHTML=h;
    div.title=`${r.label} (${r.cat})\n${fmt(r.value)} · 수익률 ${plpStr}\n일변동: ${dailyStr}`;
    box.appendChild(div);
  });
}

    const abs = Math.min(Math.abs(daily), 4); // cap at 4%

    // 중립(어두운회색) → 상승(진한초록) / 하락(진한빨강)

    <div class="tm-leg"><div class="tm-dot" style="background:rgb(16,185,90)"></div>상승</div>`;

  const rd=[{l:"지수형",v:rp(P.idxT),c:"#4d9aff"},{l:"배당",v:rp(P.divT),c:"#2ee0a8"},{l:"성장",v:rp(P.groT),c:"#ae82ff"},{l:"국내",v:P.krT.inv>0?((P.krT.val-P.krT.inv)/P.krT.inv*100):0,c:"#ffc05c"}];

function mkPriceTrendChart(canvasId, tickerList) {
  // tickerList에 해당하는 종목의 가격 데이터로 수익률(%) 추이 차트 생성
  const available = tickerList.filter(t => P.tickerHistory[t]?.length > 1);
  if (available.length === 0) return;
  
  // 공통 날짜 축 = 첫 번째 종목의 날짜 (모든 종목이 같은 날짜 가정)
  const refTicker = available[0];
  const labels = P.tickerHistory[refTicker].map(d => d.d);
  
  const datasets = available.map((ticker, i) => {
    const hist = P.tickerHistory[ticker];
    const first = hist[0].p;
    return {
      label: ticker,
      data: hist.map(h => ((h.p / first) - 1) * 100),
      borderColor: LINE_COLORS[i % LINE_COLORS.length],
      backgroundColor: LINE_COLORS[i % LINE_COLORS.length] + "20",
      fill: true,
      tension: 0.3,
      pointRadius: 0,
      borderWidth: 2,
    };
  });
  
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      scales: {
        x: { ticks: { color: "#5e82a8", font: { size: 9 }, maxTicksLimit: 8 }, grid: { color: "#1f3a6220" } },
        y: { ticks: { color: "#5e82a8", font: { size: 10 }, callback: v => v.toFixed(0) + "%" }, grid: { color: "#1f3a6220" } }
      },

        legend: { labels: { color: "#9db5d4", font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ": " + ctx.raw?.toFixed(2) + "%" } }
      }
    }
  });
}

    options:{
      responsive:true,interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{labels:{color:"#f2f6ff",font:{size:11,weight:"bold"},usePointStyle:true,padding:14}},

      },
      scales:{
        x:{ticks:{color:"#9db5d4",font:{size:10,weight:"bold"},maxRotation:45},grid:{display:false}},

  setInterval(() => {
    _countdown--;
    const m = Math.floor(_countdown / 60), s = _countdown % 60;
    const el = document.getElementById("refreshTimer");
    if (el) el.textContent = `${m}:${String(s).padStart(2,"0")}`;
    if (_countdown <= 0) {
      _countdown = REFRESH_SEC;

    }
  }, 1000);
}

function rsOpenDB(){
  return new Promise((res,rej)=>{
    if(_rsDB.inst){res(_rsDB.inst);return;}
    const req=indexedDB.open("PortfolioRiskDB_v2",1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      ['rsUS','rsKR'].forEach(n=>{if(!db.objectStoreNames.contains(n))db.createObjectStore(n,{keyPath:"k"});});
    };
    req.onsuccess=e=>{_rsDB.inst=e.target.result;res(_rsDB.inst);};
    req.onerror=e=>rej(e.target.error);
  });
}
async function rsDbPut(store,k,v){
  try{
    const db=await rsOpenDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction(store,"readwrite");
      tx.objectStore(store).put({k,v,ts:Date.now()});
      tx.oncomplete=()=>res();tx.onerror=e=>rej(e);
    });
  }catch(e){console.warn("rsDbPut",e)}
}
async function rsDbGetAll(store){
  try{
    const db=await rsOpenDB();
    return new Promise((res,rej)=>{
      const tx=db.transaction(store,"readonly");
      const req=tx.objectStore(store).getAll();
      req.onsuccess=()=>res(req.result||[]);
      req.onerror=e=>rej(e);
    });
  }catch(e){return[]}
}

// ── AbortSignal 폴리필 ──
function rsAbortSignal(ms){
  if(typeof AbortSignal!=='undefined'&&AbortSignal.timeout)return AbortSignal.timeout(ms);
  const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),ms);return ctrl.signal;
}

// ── Yahoo Finance ──
async function rsYahooFetch(sym,range,interval){
  const u=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=${range}&interval=${interval||"1d"}&includePrePost=false`;
  for(const p of[`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,`https://corsproxy.io/?${encodeURIComponent(u)}`]){
    try{const r=await fetch(p,{signal:rsAbortSignal(12000)});if(r.ok){const j=await r.json();if(j?.chart?.result?.[0])return j;}}catch{}
  }
  return null;
}
function rsParseCandles(j){try{return j?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(v=>v!=null&&!isNaN(v))||null}catch{return null}}
function rsParseQuote(j){
  try{
    const r=j?.chart?.result?.[0];if(!r)return null;
    const m=r.meta,q=r.indicators?.quote?.[0],ts=r.timestamp;
    if(!m||!q||!ts?.length)return null;
    const l=ts.length-1;
    return{c:m.regularMarketPrice||q.close?.[l],pc:m.chartPreviousClose||m.previousClose,h:q.high?.[l],l:q.low?.[l]};
  }catch{return null}
}

// ── Finnhub (US 현재가) ──
async function rsFhQuote(sym){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FHKEY}`,{signal:rsAbortSignal(8000)});
    if(!r.ok)return null;
    const d=await r.json();
    return(d.c>0||d.h>0)?{c:d.c,pc:d.pc,h:d.h,l:d.l}:null;
  }catch{return null}
}

// ── US 데이터 취득 ──
async function rsUSQuote(sym){const q=await rsFhQuote(sym);if(q?.c>0)return q;const j=await rsYahooFetch(sym,"1d","5m");return j?rsParseQuote(j):null;}
async function rsUSCandles(sym){const j=await rsYahooFetch(sym,"2y","1d");return j?rsParseCandles(j):null;}

// ── KR 티커 변환 ──
function rsKRTicker(t){
  if(!t)return t;
  if(t.startsWith("KRX:"))return t.replace("KRX:","")+".KS";
  if(t.endsWith(".KS")||t.endsWith(".KQ"))return t;
  if(/^\d{5,6}$/.test(t.trim()))return t.trim()+".KS";
  return t;
}
async function rsKRQuote(sym){
  for(const sfx of[sym,sym.replace(".KS",".KQ")]){const j=await rsYahooFetch(sfx,"1d","5m");if(j){const q=rsParseQuote(j);if(q?.c)return q;}}
  return null;
}
async function rsKRCandles(sym){
  for(const sfx of[sym,sym.replace(".KS",".KQ")]){const j=await rsYahooFetch(sfx,"2y","1d");if(j){const c=rsParseCandles(j);if(c?.length>20)return c;}}
  return null;
}

// ── 기술적 지표 ──
function rsSMA(c,p){return c.length<p?null:c.slice(-p).reduce((a,b)=>a+b,0)/p}
function rsRSI(c){
  const p=14;if(c.length<p+1)return null;
  const r=c.slice(-(p+1));let g=0,l=0;
  for(let i=1;i<r.length;i++){const d=r[i]-r[i-1];d>0?g+=d:l-=d;}
  return l===0?100:100-100/(1+g/p/(l/p));
}
function rsBB(c){
  const p=20;if(c.length<p)return null;
  const s=c.slice(-p),m=s.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(s.reduce((a,b)=>a+(b-m)**2,0)/p);
  return{upper:m+2*std,middle:m,lower:m-2*std};
}
function rsFindRisks(pr,prevClose,ind){
  const R=[];if(!pr||!ind)return R;
  if(prevClose>0){const ch=((pr-prevClose)/prevClose)*100;if(ch<=-3)R.push({type:"DROP",sev:"critical",msg:`일간 ${ch.toFixed(2)}% 급락`});}
  for(const[k,lb]of[["ma50","50일"],["ma100","100일"],["ma200","200일"],["ma300","300일"]]){
    const v=ind[k];if(v==null)continue;const d=((pr-v)/v)*100;
    if(Math.abs(d)<=0.5)R.push({type:"MA_T",sev:"high",msg:`${lb}선 터치`});
    else if(d<-0.5&&d>-3)R.push({type:"MA_B",sev:"critical",msg:`${lb}선 이탈(${d.toFixed(1)}%)`});
  }
  if(ind.rsi!=null){
    if(ind.rsi>=75)R.push({type:"RSI_OB",sev:"medium",msg:`RSI ${ind.rsi.toFixed(0)} 과매수`});
    else if(ind.rsi<=25)R.push({type:"RSI_OS",sev:"high",msg:`RSI ${ind.rsi.toFixed(0)} 과매도`});
  }
  if(ind.bb){
    if(pr>ind.bb.upper)R.push({type:"BB_U",sev:"medium",msg:"BB 상단돌파"});
    if(pr<ind.bb.lower)R.push({type:"BB_D",sev:"high",msg:"BB 하단이탈"});
  }
  return R;
}

// ── 단일 종목 처리 ──
async function rsProcessOne(mkt, portTicker, isKR){
  const store=isKR?RS_KR:RS_US;
  const dbStore=isKR?"rsKR":"rsUS";
  store.data[portTicker]={...(store.data[portTicker]||{}),loading:true};

  const fetchTicker=isKR?rsKRTicker(portTicker):portTicker;
  const q=isKR?await rsKRQuote(fetchTicker):await rsUSQuote(fetchTicker);
  await RSW(130);
  const cl=isKR?await rsKRCandles(fetchTicker):await rsUSCandles(fetchTicker);
  await RSW(130);

  if(!q||!(q.c>0)){store.data[portTicker]={loading:false,error:true};return;}

  const pr=q.c,pc=q.pc||0;
  const hasC=cl&&cl.length>20;
  const ind=hasC?{ma50:rsSMA(cl,50),ma100:rsSMA(cl,100),ma200:rsSMA(cl,200),ma300:rsSMA(cl,300),rsi:rsRSI(cl),bb:rsBB(cl)}:{ma50:null,ma100:null,ma200:null,ma300:null,rsi:null,bb:null};

  store.data[portTicker]={
    loading:false,loaded:true,loadedAt:Date.now(),
    price:pr,prevClose:pc,changePct:pc>0?((pr-pc)/pc)*100:0,
    closes:hasC?cl:null,ind,risks:rsFindRisks(pr,pc,ind)
  };
  store.status.loaded++;
  rsDbPut(dbStore,portTicker,store.data[portTicker]);

  // 현재 탭이 해당 시장이면 즉시 UI 반영
  rsUpdateStatus(mkt);
  const tab=isKR?"kr-risk":"us-risk";
  if(activeTab===tab)rsUpdateMonitor(mkt);
}

// ── 시장별 독립 로드 ──
async function rsLoadUS(){
  if(RS_US.status.loading)return;
  RS_US.status.loading=true;RS_US.status.loaded=0;
  const stocks=[...P.index,...P.dividend,...P.growth].filter(h=>h.ticker&&h.ticker.trim()!=="");
  RS_US.status.total=stocks.length;
  rsUpdateStatus("us");
  for(const h of stocks)await rsProcessOne("us",h.ticker,false);
  RS_US.status.loading=false;RS_US.status.lastUp=new Date();
  rsUpdateStatus("us");
  if(activeTab==="us-risk")rsUpdateMonitor("us");
}
async function rsLoadKR(){
  if(RS_KR.status.loading)return;
  RS_KR.status.loading=true;RS_KR.status.loaded=0;
  const stocks=(P.kr||[]).filter(h=>h.ticker&&h.ticker.trim()!=="");
  RS_KR.status.total=stocks.length;
  rsUpdateStatus("kr");
  for(const h of stocks)await rsProcessOne("kr",h.ticker,true);
  RS_KR.status.loading=false;RS_KR.status.lastUp=new Date();
  rsUpdateStatus("kr");
  if(activeTab==="kr-risk")rsUpdateMonitor("kr");
}

// ── 엔진 시작 ──
async function startRSSentinel(){
  if(!P||!P.index||!P.dividend||!P.growth||!P.kr){
    console.warn("[RS] P 미준비, 500ms 재시도");
    setTimeout(startRSSentinel,500);return;
  }
  // DB 캐시 복원
  const [cachedUS,cachedKR]=await Promise.all([rsDbGetAll("rsUS"),rsDbGetAll("rsKR")]);
  cachedUS.forEach(r=>{if(r.k&&r.v?.loaded)RS_US.data[r.k]=r.v;});
  cachedKR.forEach(r=>{if(r.k&&r.v?.loaded)RS_KR.data[r.k]=r.v;});
  if(activeTab==="us-risk")rsUpdateMonitor("us");
  if(activeTab==="kr-risk")rsUpdateMonitor("kr");

  // 양쪽 동시 백그라운드 로딩
  rsLoadUS();
  rsLoadKR();

  // 60초마다 자동 갱신
  setInterval(rsLoadUS,60000);
  setInterval(rsLoadKR,62000); // 2초 오프셋으로 API 충돌 방지

  // 8초마다 UI 점진적 갱신
  setInterval(()=>{
    rsUpdateStatus("us");rsUpdateStatus("kr");
    if(activeTab==="us-risk")rsUpdateMonitor("us");
    if(activeTab==="kr-risk")rsUpdateMonitor("kr");
  },8000);
}

// ── 상태바 업데이트 ──
function rsUpdateStatus(mkt){
  const isUS=mkt==="us";
  const st=isUS?RS_US.status:RS_KR.status;
  const data=isUS?RS_US.data:RS_KR.data;
  const elId=isUS?"rsStatusUS":"rsStatusKR";
  const el=document.getElementById(elId);if(!el)return;
  if(st.loading){
    el.innerHTML=`<span class="rs-dot-load"></span><span style="font-size:9px;color:var(--amber);font-weight:700">갱신중 ${st.loaded}/${st.total}</span>`;
  }else if(st.lastUp){
    const hasRisk=Object.values(data).some(d=>d.risks?.length>0);
    const sec=Math.round((Date.now()-st.lastUp.getTime())/1000);
    el.innerHTML=`<span class="rs-dot-live"></span><span style="font-size:9px;color:${hasRisk?"var(--red)":"var(--green)"};font-weight:700">${hasRisk?"⚠ 리스크 감지":"✓ 정상"}</span><span style="font-size:8px;color:var(--mute);margin-left:5px">${st.lastUp.toLocaleTimeString("ko-KR")} (${sec}s전)</span>`;
  }
}

// ── 스파크라인 SVG ──
function mkSparkSVG(closes,w,h){
  w=w||160;h=h||28;
  if(!closes||closes.length<2)return'';
  const d=closes.slice(-40);
  const mn=Math.min(...d)*.998,mx=Math.max(...d)*1.002,rng=mx-mn||1;
  const Y=v=>2+((mx-v)/rng)*(h-4),X=i=>(i/(d.length-1))*w;
  const pts=d.map((v,i)=>`${i===0?"M":"L"}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join("");
  const up=d[d.length-1]>=d[0],c=up?"#2ee0a8":"#ff6b78";
  const gid=`rsg${w}x${h}`;
  return`<svg width="${w}" height="${h}" style="display:block"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c}" stop-opacity=".15"/><stop offset="100%" stop-color="${c}" stop-opacity="0"/></linearGradient></defs><path d="${pts} L${w},${h} L0,${h} Z" fill="url(#${gid})"/><path d="${pts}" fill="none" stroke="${c}" stroke-width="1.6"/><circle cx="${X(d.length-1)}" cy="${Y(d[d.length-1])}" r="2.5" fill="${c}"/></svg>`;
}

// ── 리스크 배지 HTML ──
function mkRiskBadgesHTML(risks){
  if(!risks?.length)return'';
  const cls={critical:"rs-crit",high:"rs-high",medium:"rs-med"};
  return risks.slice(0,2).map(r=>`<span class="rs-badge ${cls[r.sev]||'rs-med'}">${r.msg.length>13?r.msg.slice(0,13)+"…":r.msg}</span>`).join("")
    +(risks.length>2?`<span style="font-size:7px;color:var(--mute)"> +${risks.length-2}</span>`:"");
}

// ── 카드 DOM 업데이트 (미장/국장 공통) ──
function rsUpdateMonitor(mkt){
  const isUS=mkt==="us";
  const store=isUS?RS_US:RS_KR;
  const priceFmt=isUS?(v=>"$"+v.toFixed(2)):(v=>"₩"+Math.round(v).toLocaleString("ko-KR"));
  const stocks=isUS?[...P.index,...P.dividend,...P.growth]:P.kr||[];

  // 섹터별 리스크 카운트 배지 (US만)
  if(isUS){
    [{label:"지수형 INDEX",items:P.index},{label:"배당형 DIVIDEND",items:P.dividend},{label:"성장주 GROWTH",items:P.growth}].forEach(sec=>{
      const cnt=sec.items.filter(h=>h.ticker).reduce((s,h)=>s+(RS_US.data[h.ticker]?.risks?.length||0),0);
      const el=document.getElementById("rsSecAlert_"+rsSafeId(sec.label));
      if(el)el.innerHTML=cnt>0?`<span class="rs-badge rs-crit">${cnt} risks</span>`:"";
    });
  }

  // 상태바 갱신
  rsUpdateStatus(mkt);

  // 각 카드 업데이트
  stocks.filter(h=>h.ticker).forEach(h=>{
    const d=store.data[h.ticker];
    const sid=rsSafeId(h.ticker);
    const card=document.getElementById("rscard_"+sid);if(!card)return;

    // 숫자 배지
    const cntEl=document.getElementById("rscnt_"+sid);
    if(cntEl){
      const cnt=d?.risks?.length||0;
      if(!d||(!d.loaded&&!d.error)){
        cntEl.className="rs-cnt-badge rs-cnt-wait";cntEl.textContent="—";
      }else if(cnt>0){
        cntEl.className="rs-cnt-badge rs-cnt-risk";cntEl.textContent=cnt;
      }else{
        cntEl.className="rs-cnt-badge rs-cnt-ok";cntEl.textContent="✓";
      }
    }

    // 리스크 유무에 따른 카드 스타일
    const hasRisk=d?.risks?.length>0;
    const maxSev=d?.risks?.reduce((m,r)=>{const o={critical:3,high:2,medium:1};return(o[r.sev]||0)>(o[m]||0)?r.sev:m},"");
    const sevColor={critical:"#ef4444",high:"#f97316",medium:"#eab308"}[maxSev]||(isUS?"var(--blue)":"var(--amber)");
    if(hasRisk){card.classList.add("rs-alert");}else{card.classList.remove("rs-alert");}
    const topLine=card.querySelector("div[style*='height:2px']");
    if(topLine)topLine.style.background=`linear-gradient(90deg,transparent,${sevColor},transparent)`;

    // 가격
    const priceEl=document.getElementById("rscardprice_"+sid);
    if(priceEl&&d?.price){
      const up=(d.changePct||0)>=0,clr=up?"var(--green)":"var(--red)";
      priceEl.innerHTML=`<div style="font-size:12px;font-weight:800;color:${clr};font-family:monospace;line-height:1.2">${priceFmt(d.price)}</div><div style="font-size:8px;color:${clr};font-weight:700">${up?"▲":"▼"}${Math.abs(d.changePct||0).toFixed(2)}%</div>`;
    }

    // 스파크라인
    const sparkEl=document.getElementById("rscardpark_"+sid);
    if(sparkEl){
      if(d?.closes?.length>2)sparkEl.innerHTML=mkSparkSVG(d.closes,160,28);
      else if(!d||d.loading)sparkEl.innerHTML='<div class="rs-spark-ph" style="height:28px"></div>';
    }

    // 배지
    const badgeEl=document.getElementById("rscardbadge_"+sid);
    if(badgeEl){
      if(d?.loaded)badgeEl.innerHTML=d.risks?.length?mkRiskBadgesHTML(d.risks):'<span style="font-size:8px;color:var(--green);font-weight:700">✓ 신호 없음</span>';
      else if(d?.loading)badgeEl.innerHTML='<span style="font-size:8px;color:var(--mute)">로딩 중...</span>';
      else if(d?.error)badgeEl.innerHTML='<span style="font-size:8px;color:var(--red)">데이터 없음</span>';
    }
  });
} // rsUpdateMonitor 끝

// 큰 차트 SVG (팝업용)
function mkBigChartSVG(closes, maLines, bb, w, h, fmtShort){
  w=w||560; h=h||180;
  if(!closes||closes.length<5)return'<div style="text-align:center;padding:40px;color:var(--mute);font-size:12px">차트 데이터 없음</div>';
  const d=closes.slice(-90);
  const allV=[...d];
  if(maLines)Object.values(maLines).forEach(v=>{if(v!=null)allV.push(v);});
  if(bb){allV.push(bb.upper,bb.lower);}
  const mn=Math.min(...allV)*.997, mx=Math.max(...allV)*1.003, rng=mx-mn||1;
  const pL=52,pR=12,pT=8,pB=4,cw=w-pL-pR,ch=h-pT-pB;
  const Y=v=>pT+((mx-v)/rng)*ch, X=i=>pL+(i/(d.length-1))*cw;
  const pts=d.map((v,i)=>`${i===0?"M":"L"}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join("");
  const up=d[d.length-1]>=d[0], clr=up?"#2ee0a8":"#ff6b78";
  const maC={ma50:"#4d9aff",ma100:"#ae82ff",ma200:"#ffc05c",ma300:"#ff6bb5"};
  const maLb={ma50:"50D",ma100:"100D",ma200:"200D",ma300:"300D"};
  let els="";
  // 그리드 라인 + Y축 레이블
  for(let i=0;i<=4;i++){
    const v=mx-(rng/4)*i;
    els+=`<line x1="${pL}" y1="${Y(v).toFixed(1)}" x2="${w-pR}" y2="${Y(v).toFixed(1)}" stroke="#1e293b" stroke-width=".5"/>`;
    els+=`<text x="${pL-3}" y="${(Y(v)+3).toFixed(1)}" text-anchor="end" fill="#5e82a8" font-size="9" font-family="monospace">${fmtShort(v)}</text>`;
  }
  // BB 영역
  if(bb&&Y(bb.upper)<Y(bb.lower)){
    els+=`<rect x="${pL}" y="${Y(bb.upper).toFixed(1)}" width="${cw}" height="${Math.max(0,Y(bb.lower)-Y(bb.upper)).toFixed(1)}" fill="rgba(234,179,8,.06)"/>`;
    els+=`<line x1="${pL}" y1="${Y(bb.upper).toFixed(1)}" x2="${w-pR}" y2="${Y(bb.upper).toFixed(1)}" stroke="#eab308" stroke-width=".7" stroke-dasharray="4,3" opacity=".5"/>`;
    els+=`<line x1="${pL}" y1="${Y(bb.lower).toFixed(1)}" x2="${w-pR}" y2="${Y(bb.lower).toFixed(1)}" stroke="#eab308" stroke-width=".7" stroke-dasharray="4,3" opacity=".5"/>`;
  }
  // 이동평균선
  if(maLines){
    Object.entries(maLines).forEach(([k,v])=>{
      if(v==null||v<mn||v>mx)return;
      els+=`<line x1="${pL}" y1="${Y(v).toFixed(1)}" x2="${w-pR}" y2="${Y(v).toFixed(1)}" stroke="${maC[k]}" stroke-width="1.1" stroke-dasharray="6,3" opacity=".65"/>`;
      els+=`<text x="${w-pR+2}" y="${(Y(v)+3).toFixed(1)}" fill="${maC[k]}" font-size="7.5" font-family="monospace" font-weight="700">${maLb[k]}</text>`;
    });
  }
  // 가격선 + 그라디언트
  const gid=`bc${Math.random().toString(36).slice(2,6)}`;
  els+=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${clr}" stop-opacity=".18"/><stop offset="100%" stop-color="${clr}" stop-opacity="0"/></linearGradient></defs>`;
  els+=`<path d="${pts} L${w-pR},${h-pB} L${pL},${h-pB} Z" fill="url(#${gid})"/>`;
  els+=`<path d="${pts}" fill="none" stroke="${clr}" stroke-width="2"/>`;
  els+=`<circle cx="${X(d.length-1).toFixed(1)}" cy="${Y(d[d.length-1]).toFixed(1)}" r="4" fill="${clr}" stroke="#0d1525" stroke-width="2"/>`;
  return`<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="display:block;overflow:visible">${els}</svg>`;
}

function rsShowDetail(ticker, isKR){
  // 기존 팝업 제거
  document.getElementById("rsDetailOverlay")?.remove();

  const store=isKR?RS_KR:RS_US;
  const d=store.data[ticker];
  const portList=isKR?P.kr:[...P.index,...P.dividend,...P.growth];
  const portItem=portList.find(h=>h.ticker===ticker)||{};

  const dispTicker=ticker.startsWith("KRX:")?ticker.replace("KRX:",""):ticker;
  const name=portItem.name||dispTicker;
  const hasData=d?.loaded;
  const price=d?.price;
  const up=(d?.changePct||0)>=0;
  const clr=up?"var(--green)":"var(--red)";
  const priceFmt=isKR?(v=>"₩"+Math.round(v).toLocaleString("ko-KR")):(v=>"$"+v.toFixed(2));
  const shortFmt=isKR?(v=>"₩"+Math.round(v/100)*100|0):(v=>"$"+v.toFixed(0));
  const sevColor={critical:"#ef4444",high:"#f97316",medium:"#eab308",low:"#2ee0a8"};
  const sevLabel={critical:"CRITICAL",high:"HIGH",medium:"MEDIUM",low:"LOW"};
  const sevBorderL={critical:"#ef4444",high:"#f97316",medium:"#eab308",low:"#334155"};

  // 지표 셀 생성
  function indCell(label,val,color){
    return`<div class="rs-ind-cell"><div class="rs-ind-label">${label}</div><div class="rs-ind-val" style="color:${color||"var(--txt2)"}">${val!=null?val:"—"}</div></div>`;
  }
  const ind=d?.ind||{};
  const rsiColor=ind.rsi>=70?"#ef4444":ind.rsi<=30?"#2ee0a8":"var(--txt2)";

  // 리스크 행 생성
  const riskRows=(d?.risks||[]).map(r=>`
    <div class="rs-risk-row" style="border-left:3px solid ${sevBorderL[r.sev]||"#334155"}">
      <span style="font-size:8px;font-weight:800;color:${sevColor[r.sev]};min-width:54px">${sevLabel[r.sev]}</span>
      <span style="font-size:12px;color:var(--txt2)">${r.msg}</span>
    </div>`).join("");

  // 포트폴리오 정보 셀
  const portCells=[
    {l:"보유수량",v:portItem.qty?(isKR?portItem.qty+"주":portItem.qty%1?portItem.qty.toFixed(2)+"주":portItem.qty+"주"):"—",c:"var(--txt)"},
    {l:"평균단가",v:portItem.avg?priceFmt(portItem.avg):"—",c:"var(--sub)"},
    {l:"평가금액",v:portItem.val?(isKR?fK(portItem.val):fU(Math.round(portItem.val))):"—",c:"var(--txt)"},
    {l:"수익률",v:portItem.plp!=null?fP(portItem.plp):"—",c:portItem.plp>=0?"var(--green)":"var(--red)"},
    {l:"배당수익률",v:portItem.divY>0?portItem.divY.toFixed(2)+"%":"—",c:"var(--green)"},
    {l:"MDD",v:portItem.mdd!=null?portItem.mdd.toFixed(1)+"%":"—",c:Math.abs(portItem.mdd||0)>=10?"var(--red)":Math.abs(portItem.mdd||0)>=5?"var(--amber)":"var(--green)"},
  ].map(x=>`<div class="rs-port-cell"><div style="font-size:8px;color:var(--mute);font-weight:700;margin-bottom:4px">${x.l}</div><div style="font-size:13px;font-weight:800;color:${x.c}">${x.v}</div></div>`).join("");

  const overlay=document.createElement("div");
  overlay.className="rs-overlay";
  overlay.id="rsDetailOverlay";
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};

  overlay.innerHTML=`
  <div class="rs-popup" onclick="event.stopPropagation()">
    <!-- 헤더 -->
    <div class="rs-popup-head">
      <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
        <div style="min-width:0">
          <div style="font-size:16px;font-weight:900;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
          <div style="font-size:10px;color:var(--sub);margin-top:2px;font-family:monospace">${dispTicker}${isKR?" · KRX":""}</div>
        </div>
        ${hasData&&price?`
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:22px;font-weight:900;color:${clr};font-family:monospace;line-height:1">${priceFmt(price)}</div>
          <div style="font-size:11px;color:${clr};font-weight:700;margin-top:2px">${up?"▲":"▼"}${Math.abs(d.changePct||0).toFixed(2)}%</div>
        </div>`:""}
      </div>
      <button class="rs-popup-close" onclick="document.getElementById('rsDetailOverlay').remove()">✕</button>
    </div>

    <!-- 본문 -->
    <div class="rs-popup-body">

      <!-- 차트 -->
      ${hasData&&d.closes?`
      <div style="background:var(--s1);border-radius:10px;padding:12px 8px 6px;margin-bottom:14px;border:1px solid var(--bdr)">
        ${mkBigChartSVG(d.closes,d.ind,d.ind?.bb,560,175,shortFmt)}
        <div style="display:flex;gap:12px;justify-content:center;margin-top:8px;flex-wrap:wrap">
          ${[["50D","#4d9aff"],["100D","#ae82ff"],["200D","#ffc05c"],["300D","#ff6bb5"],["BB","#eab308"]].map(([l,c])=>`
          <div style="display:flex;align-items:center;gap:4px">
            <div style="width:14px;height:2px;background:${c};opacity:.8"></div>
            <span style="font-size:8px;color:var(--mute)">${l}</span>
          </div>`).join("")}
        </div>
      </div>`:`
      <div style="background:var(--s1);border-radius:10px;padding:28px;text-align:center;margin-bottom:14px;color:var(--mute);font-size:12px">
        ${d?.loading?"📡 차트 데이터 로딩 중...":d?.error?"⚠ 데이터를 불러올 수 없습니다":"📡 데이터 대기 중..."}
      </div>`}

      <!-- 리스크 신호 -->
      ${d?.risks?.length?`
      <div style="margin-bottom:14px">
        <div style="font-size:10px;font-weight:800;color:var(--red);letter-spacing:.5px;margin-bottom:8px">⚠ 감지된 리스크 신호 (${d.risks.length}개)</div>
        ${riskRows}
      </div>`:(hasData?`<div style="padding:10px 14px;background:rgba(46,224,168,.07);border-radius:8px;border:1px solid rgba(46,224,168,.18);color:var(--green);font-size:12px;font-weight:700;margin-bottom:14px;text-align:center">✓ 현재 감지된 리스크 신호 없음</div>`:"")
      }

      <!-- 기술적 지표 -->
      <div style="margin-bottom:14px">
        <div style="font-size:10px;font-weight:800;color:var(--mute);letter-spacing:.5px;margin-bottom:8px">기술적 지표</div>
        <div class="rs-ind-grid">
          ${indCell("현재가",hasData?priceFmt(price):null,clr)}
          ${indCell("전일종가",hasData&&d.prevClose?priceFmt(d.prevClose):null,"var(--sub)")}
          ${indCell("RSI(14)",ind.rsi!=null?ind.rsi.toFixed(1):null,rsiColor)}
          ${indCell("50일선",ind.ma50!=null?shortFmt(ind.ma50):null,"#4d9aff")}
          ${indCell("100일선",ind.ma100!=null?shortFmt(ind.ma100):null,"#ae82ff")}
          ${indCell("200일선",ind.ma200!=null?shortFmt(ind.ma200):null,"#ffc05c")}
          ${indCell("300일선",ind.ma300!=null?shortFmt(ind.ma300):null,"#ff6bb5")}
          ${indCell("BB상단",ind.bb?.upper!=null?shortFmt(ind.bb.upper):null,"#eab308")}
          ${indCell("BB중심",ind.bb?.middle!=null?shortFmt(ind.bb.middle):null,"#eab308")}
          ${indCell("BB하단",ind.bb?.lower!=null?shortFmt(ind.bb.lower):null,"#eab308")}
          ${indCell("BB(20)",portItem.bb20||null,"var(--txt2)")}
          ${indCell("BB(252)",portItem.bb252||null,"var(--txt2)")}
        </div>
      </div>

      <!-- 포트폴리오 현황 -->
      ${portItem.qty?`
      <div>
        <div style="font-size:10px;font-weight:800;color:var(--mute);letter-spacing:.5px;margin-bottom:8px">포트폴리오 현황</div>
        <div class="rs-port-grid">${portCells}</div>
      </div>`:""}

      <div style="margin-top:16px;text-align:center;font-size:9px;color:var(--mute)">
        ${d?.loadedAt?`마지막 업데이트: ${new Date(d.loadedAt).toLocaleString("ko-KR")}`:"데이터 미수신"}
        · 클릭 외부 또는 ✕ 버튼으로 닫기
      </div>
    </div>
  </div>`;

  document.body.appendChild(overlay);
}
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
